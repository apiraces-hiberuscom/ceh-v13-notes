<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEH v13 Study Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f1117;--bg-secondary:#161822;--bg-tertiary:#1c1f2e;
  --bg-card:#1a1d2e;--bg-hover:#242840;--bg-active:#2a2f4a;
  --text-primary:#e4e6f0;--text-secondary:#9499b3;--text-muted:#6b7094;
  --accent:#6c8cff;--accent-dim:#4a65cc;--accent-glow:rgba(108,140,255,.15);
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;
  --border:#2a2e45;--border-light:#353a55;
  --sidebar-w:280px;--topbar-h:56px;
  --radius:8px;--radius-lg:12px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth;font-size:15px}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);line-height:1.7;overflow:hidden;height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s ease}
.sidebar-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-logo .shield{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-logo h1{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.sidebar-logo span{font-size:.7rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.sidebar-search{position:relative;margin-top:12px}
.sidebar-search input{width:100%;padding:9px 12px 9px 34px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:.85rem;font-family:var(--font-sans);outline:none;transition:border .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.sidebar-search .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 12px}
.nav-section{margin-bottom:4px}
.nav-section-title{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;transition:all .15s;user-select:none}
.nav-section-title:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-section-title .chevron{font-size:10px;transition:transform .2s;color:var(--text-muted)}
.nav-section.collapsed .chevron{transform:rotate(-90deg)}
.nav-section.collapsed .nav-items{display:none}
.nav-items{padding:2px 0 6px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px 7px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85rem;color:var(--text-secondary);transition:all .15s;position:relative}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:2px}
.nav-item .mod-num{font-size:.7rem;font-weight:700;color:var(--text-muted);min-width:22px;font-family:var(--font-mono)}
.nav-item.active .mod-num{color:var(--accent)}
.nav-item .progress-dot{width:6px;height:6px;border-radius:50%;background:var(--border-light);margin-left:auto;flex-shrink:0;transition:background .3s}
.nav-item .progress-dot.done{background:var(--green)}
.nav-subitem{padding-left:30px;font-size:.8rem}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.progress-global{display:flex;align-items:center;gap:10px}
.progress-global .bar{flex:1;height:4px;background:var(--bg-tertiary);border-radius:2px;overflow:hidden}
.progress-global .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s ease}
.progress-global .pct{font-size:.75rem;font-weight:600;color:var(--text-muted);min-width:32px;text-align:right}

/* MAIN */
.main{margin-left:var(--sidebar-w);height:100vh;display:flex;flex-direction:column}
.topbar{height:var(--topbar-h);padding:0 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar .breadcrumb{font-size:.85rem;color:var(--text-muted)}
.topbar .breadcrumb strong{color:var(--text-primary);font-weight:600}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-btn{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.8rem;font-family:var(--font-sans);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light)}
.topbar-btn.mark-done{border-color:var(--green);color:var(--green)}
.topbar-btn.mark-done:hover{background:rgba(74,222,128,.1)}
.topbar-btn.mark-done.is-done{background:rgba(74,222,128,.15);color:var(--green)}
.menu-toggle{display:none;padding:6px;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-size:20px}

/* CONTENT */
.content-wrap{flex:1;overflow-y:auto;scroll-behavior:smooth}
.content{max-width:900px;margin:0 auto;padding:40px 32px 80px}
.content.loading{display:flex;align-items:center;justify-content:center;min-height:60vh}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HOME */
.home-hero{text-align:center;padding:60px 0 40px}
.home-hero h1{font-size:2.2rem;font-weight:700;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent),#a78bfa,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.home-hero p{color:var(--text-secondary);font-size:1rem;max-width:500px;margin:0 auto}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:36px}
.module-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.module-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.module-card .mc-num{font-size:.7rem;font-weight:700;color:var(--accent);font-family:var(--font-mono);letter-spacing:.05em;margin-bottom:6px}
.module-card .mc-title{font-size:.95rem;font-weight:600;margin-bottom:6px;line-height:1.4}
.module-card .mc-topics{font-size:.78rem;color:var(--text-muted);line-height:1.5}
.module-card .mc-progress{position:absolute;top:0;left:0;height:3px;background:var(--green);transition:width .5s ease}
.module-card.has-parts .mc-parts{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.module-card.has-parts .mc-part{font-size:.7rem;padding:3px 8px;background:var(--bg-tertiary);border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .15s}
.module-card.has-parts .mc-part:hover{background:var(--accent-glow);color:var(--accent)}

/* MARKDOWN CONTENT */
.content h1{font-size:1.8rem;font-weight:700;margin:48px 0 16px;padding-bottom:10px;border-bottom:2px solid var(--border);letter-spacing:-.02em;line-height:1.3}
.content h1:first-child{margin-top:0}
.content h2{font-size:1.35rem;font-weight:700;margin:36px 0 14px;color:var(--text-primary);letter-spacing:-.01em}
.content h3{font-size:1.1rem;font-weight:600;margin:28px 0 10px;color:var(--text-primary)}
.content h4{font-size:.95rem;font-weight:600;margin:20px 0 8px;color:var(--text-secondary)}
.content p{margin:0 0 14px;color:var(--text-primary)}
.content strong{color:#fff;font-weight:600}
.content em{color:var(--text-secondary)}
.content ul,.content ol{margin:0 0 14px;padding-left:24px}
.content li{margin-bottom:6px}
.content li::marker{color:var(--text-muted)}
.content hr{border:none;height:1px;background:var(--border);margin:32px 0}
.content blockquote{border-left:3px solid var(--accent);background:var(--accent-glow);padding:14px 18px;margin:20px 0;border-radius:0 var(--radius) var(--radius) 0;font-size:.92rem}
.content blockquote p{margin:0;color:var(--text-primary)}
.content code{font-family:var(--font-mono);font-size:.85em;background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;color:var(--orange)}
.content pre{background:var(--bg-tertiary)!important;border:1px solid var(--border);border-radius:var(--radius);margin:16px 0;overflow-x:auto}
.content pre code{background:transparent;padding:0;font-size:.85rem;color:var(--text-primary);display:block;line-height:1.6}
.content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.content thead{background:var(--bg-tertiary)}
.content th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text-primary);border-bottom:2px solid var(--border);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.content td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
.content tbody tr:last-child td{border-bottom:none}
.content tbody tr:hover{background:var(--bg-hover)}
.content a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border .15s}
.content a:hover{border-bottom-color:var(--accent)}

/* MEMORY HOOKS & EXAM TRAPS */
.content p:has(strong:first-child) {margin-top:16px}
.content p strong{display:inline}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:120px;backdrop-filter:blur(4px)}
.search-overlay.visible{display:flex}
.search-box{width:600px;max-width:90vw;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.search-box input{width:100%;padding:16px 20px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text-primary);font-size:1rem;font-family:var(--font-sans);outline:none}
.search-box input::placeholder{color:var(--text-muted)}
.search-results{max-height:400px;overflow-y:auto;padding:8px}
.search-result{padding:12px 16px;border-radius:var(--radius);cursor:pointer;transition:background .15s}
.search-result:hover,.search-result.selected{background:var(--bg-hover)}
.search-result .sr-module{font-size:.7rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.search-result .sr-title{font-size:.9rem;font-weight:500;margin-bottom:2px}
.search-result .sr-context{font-size:.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-result mark{background:rgba(251,191,36,.25);color:var(--yellow);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:.9rem}
.search-hint{padding:8px 16px;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-muted);display:flex;gap:12px}
.search-hint kbd{background:var(--bg-tertiary);padding:2px 6px;border-radius:3px;font-family:var(--font-mono);font-size:.7rem;border:1px solid var(--border)}

/* PRACTICE QUESTIONS */
.practice-header{text-align:center;padding:40px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px}
.practice-header h1{font-size:1.8rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.practice-header p{color:var(--text-secondary);font-size:.95rem}
.practice-stats{display:flex;justify-content:center;gap:24px;margin-top:20px}
.practice-stat{text-align:center}
.practice-stat .stat-num{font-size:1.5rem;font-weight:700;color:var(--accent);font-family:var(--font-mono)}
.practice-stat .stat-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.module-filter{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:24px 0;padding:16px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
.module-filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.8rem;font-family:var(--font-sans);cursor:pointer;transition:all .15s}
.module-filter-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.module-filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.question-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;transition:all .2s}
.question-card:hover{border-color:var(--border-light)}
.question-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
.question-num{font-size:.75rem;font-weight:700;color:var(--accent);font-family:var(--font-mono);min-width:28px}
.question-text{flex:1;font-size:.92rem;font-weight:500;color:var(--text-primary);line-height:1.5}
.question-toggle{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);transition:all .2s;flex-shrink:0}
.question-card.open .question-toggle{background:var(--accent);color:#fff;border-color:var(--accent);transform:rotate(180deg)}
.question-options{padding:0 20px 16px 60px}
.question-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:var(--radius);border:1px solid transparent;transition:all .15s;cursor:pointer}
.question-option:hover{background:var(--bg-hover);border-color:var(--border)}
.question-option .opt-letter{font-size:.8rem;font-weight:600;color:var(--text-muted);min-width:20px;font-family:var(--font-mono)}
.question-option .opt-text{font-size:.88rem;color:var(--text-secondary);line-height:1.5}
.question-option.selected{background:var(--accent-glow);border-color:var(--accent)}
.question-option.selected .opt-letter{color:var(--accent)}
.question-option.selected .opt-text{color:var(--text-primary)}
.question-option.correct{background:rgba(74,222,128,.1);border-color:var(--green)}
.question-option.correct .opt-letter{color:var(--green)}
.question-option.correct .opt-text{color:var(--green)}
.question-option.incorrect{background:rgba(248,113,113,.1);border-color:var(--red)}
.question-option.incorrect .opt-letter{color:var(--red)}
.question-option.incorrect .opt-text{color:var(--red)}
.question-answer{display:none;padding:16px 20px 20px 60px;border-top:1px solid var(--border);margin-top:8px}
.question-card.open .question-answer{display:block}
.answer-label{font-size:.75rem;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.answer-text{font-size:.9rem;color:var(--text-primary);line-height:1.6}
.answer-explanation{margin-top:12px;padding:12px 16px;background:var(--bg-tertiary);border-radius:var(--radius);border-left:3px solid var(--accent)}
.answer-explanation p{margin:0;font-size:.85rem;color:var(--text-secondary);line-height:1.6}
.question-actions{display:flex;gap:8px;margin-top:12px}
.question-action-btn{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.78rem;font-family:var(--font-sans);cursor:pointer;transition:all .15s}
.question-action-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.question-action-btn.show-answer{border-color:var(--accent);color:var(--accent)}
.question-action-btn.show-answer:hover{background:var(--accent-glow)}
.practice-progress{position:sticky;bottom:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:16px;margin-top:24px;border-radius:var(--radius)}
.practice-progress .bar{flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.practice-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s ease}
.practice-progress .stats{font-size:.8rem;color:var(--text-muted);white-space:nowrap}
.practice-progress .stats strong{color:var(--accent)}
.module-practice-link{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--accent-glow);color:var(--accent);border-radius:4px;font-size:.75rem;font-weight:500;margin-left:8px;transition:all .15s}
.module-practice-link:hover{background:var(--accent);color:#fff;text-decoration:none}
.question-card .question-options{display:none}
.question-card.open .question-options{display:block}
.question-option.correct::before{content:'✓';margin-right:6px;font-weight:bold}
.question-option.incorrect::before{content:'✗';margin-right:6px;font-weight:bold}
.question-card{margin-bottom:16px}
.question-card:last-child{margin-bottom:0}
.module-filter{margin:24px 0}
.module-filter-btn{margin:4px}
.practice-progress{margin-top:32px}
/* QUIZ */
.quiz-controls{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;align-items:center}
.quiz-controls select,.quiz-controls button{padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:.85rem;font-family:var(--font-sans);cursor:pointer}
.quiz-controls select:focus,.quiz-controls button:hover{border-color:var(--accent)}
.quiz-controls button.start-btn{background:var(--accent);color:#fff;border-color:var(--accent)}
.quiz-controls button.start-btn:hover{opacity:.9}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:.85rem;color:var(--text-secondary)}
.quiz-progress .qbar{flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.quiz-progress .qfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}
.quiz-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:16px}
.quiz-card .q-num{font-size:.75rem;font-weight:600;color:var(--accent);font-family:var(--font-mono);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.quiz-card .q-text{font-size:1.05rem;line-height:1.6;margin-bottom:20px}
.quiz-card .q-set{font-size:.72rem;color:var(--text-muted);margin-bottom:12px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.9rem;color:var(--text-secondary);transition:all .15s;text-align:left;background:transparent;font-family:var(--font-sans);width:100%;line-height:1.5}
.quiz-opt:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light)}
.quiz-opt.correct{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:rgba(248,113,113,.12);border-color:var(--red);color:var(--red)}
.quiz-opt.disabled{pointer-events:none;opacity:.7}
.quiz-opt.reveal-correct{border-color:var(--green);color:var(--green)}
.quiz-explain{margin-top:16px;padding:14px 18px;background:var(--accent-glow);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;font-size:.88rem;color:var(--text-secondary);display:none;line-height:1.6}
.quiz-explain.show{display:block}
.quiz-nav{display:flex;gap:10px;margin-top:16px}
.quiz-nav button{padding:8px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:.85rem;font-family:var(--font-sans);cursor:pointer;transition:all .15s}
.quiz-nav button:hover{border-color:var(--accent)}
.quiz-nav button:disabled{opacity:.4;cursor:default}
.quiz-summary{text-align:center;padding:40px 20px}

function getProgress(){try{return JSON.parse(localStorage.getItem('ceh_progress')||'{}')}catch(e){return{}}}
function saveProgress(p){localStorage.setItem('ceh_progress',JSON.stringify(p))}
function isModuleDone(id){return!!getProgress()[id]}
function toggleModuleDone(){
  if(currentModule==='home')return;
  const p=getProgress();
  p[currentModule]=!p[currentModule];
  saveProgress(p);
  updateProgressUI();
  updateModuleCardProgress();
  const btn=document.getElementById('btnMarkDone');
  if(p[currentModule]){btn.classList.add('is-done');btn.innerHTML='&#x2713; Studied'}
  else{btn.classList.remove('is-done');btn.innerHTML='&#x2713; Mark as Studied'}
}
function updateProgressUI(){
  const p=getProgress();
  const studyMods=MODULES.filter(m=>m.files.length>0&&m.id!=='quiz');
  const done=studyMods.filter(m=>p[m.id]).length;
  const pct=Math.round((done/studyMods.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.querySelectorAll('.nav-item').forEach(el=>{
    const id=el.dataset.module;
    const dot=el.querySelector('.progress-dot');
    if(dot){if(p[id])dot.classList.add('done');else dot.classList.remove('done')}
  });
}
function updateModuleCardProgress(){
  const p=getProgress();
  document.querySelectorAll('.module-card').forEach(card=>{
    const id=card.dataset.module;
    const prog=card.querySelector('.mc-progress');
    if(prog){prog.style.width=p[id]?'100%':'0%'}
  });
}

function toggleSection(el){el.parentElement.classList.toggle('collapsed')}

function navigateTo(moduleId,fileIdx){
  currentModule=moduleId;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.module===moduleId);
  });
  const m=MODULES.find(x=>x.id===moduleId);
  if(!m||moduleId==='home'){showHome();return}
  if(moduleId==='practice'){navigateToPractice(fileIdx);return}
  if(moduleId==='quiz'){showQuizLanding();return}
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML=`<strong>${m.num?m.num+' — ':''}</strong> ${m.title}`;
  document.getElementById('btnBackHome').style.display='';
  document.getElementById('btnMarkDone').style.display='';
  const btn=document.getElementById('btnMarkDone');
  if(isModuleDone(moduleId)){btn.classList.add('is-done');btn.innerHTML='&#x2713; Studied'}
  else{btn.classList.remove('is-done');btn.innerHTML='&#x2713; Mark as Studied'}

  content.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  content.className='content loading';
  closeSidebar();
  loadModule(m,fileIdx||0);
}

async function loadModule(m,fileIdx){
  const cacheKey=m.id+'_'+fileIdx;
  if(moduleCache[cacheKey]){renderContent(moduleCache[cacheKey]);return}
  try{
    const allContent=[];
    for(const file of m.files){
      const resp=await fetch(encodeURIComponent(file));
      if(!resp.ok)throw new Error('Failed to load '+file);
      allContent.push(await resp.text());
    }
    moduleCache[cacheKey]=allContent.join('\n\n---\n\n');
    renderContent(moduleCache[cacheKey]);
  }catch(e){
    const content=document.getElementById('contentArea');
    content.className='content';
    content.innerHTML=`<h1>Error loading content</h1><p>Could not load: ${m.files.join(', ')}</p><p style="color:var(--text-muted)">Make sure the files exist in the repository.</p>`;
  }
}

function renderContent(md){
  const content=document.getElementById('contentArea');
  marked.setOptions({
    gfm:true,
    breaks:false,
    highlight:function(code,lang){
      if(lang&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;
      return hljs.highlightAuto(code).value;
    }
  });
  let html=marked.parse(md);
  content.innerHTML=html;
  content.className='content';
  document.getElementById('contentWrap').scrollTop=0;
  content.querySelectorAll('pre code').forEach(block=>hljs.highlightElement(block));
}

/* SEARCH */
async function buildSearchIndex(){
  if(searchReady)return;
  const chunks=[];
  for(const m of MODULES){
    if(m.files.length===0)continue;
    for(const file of m.files){
      try{
        const resp=await fetch(encodeURIComponent(file));
        if(!resp.ok)continue;
        const text=await resp.text();
        const lines=text.split('\n');
        let currentSection='';
        lines.forEach((line,i)=>{
          if(line.startsWith('#'))currentSection=line.replace(/^#+\s*/,'');
          if(line.trim().length>20){
            chunks.push({module:m.id,moduleTitle:m.title,num:m.num,file:file,section:currentSection,text:line.trim(),line:i});
          }
        });
      }catch(e){}
    }
  }
  allSearchIndex=chunks;
  searchReady=true;
}

function performSearch(query){
  if(!query.trim())return[];
  const terms=query.toLowerCase().split(/\s+/).filter(Boolean);
  const results=[];
  for(const chunk of allSearchIndex){
    const lower=chunk.text.toLowerCase();
    if(terms.every(t=>lower.includes(t))){
      let context=chunk.text;
      const firstTerm=terms[0];
      const idx=lower.indexOf(firstTerm);
      if(idx>-1){
        const start=Math.max(0,idx-40);
        const end=Math.min(context.length,idx+firstTerm.length+80);
        context=(start>0?'...':'')+context.slice(start,end)+(end<context.length?'...':'');
      }else{
        context=context.slice(0,120)+(context.length>120?'...':'');
      }
      let highlighted=context;
      terms.forEach(t=>{
        const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        highlighted=highlighted.replace(re,'<mark>$1</mark>');
      });
      results.push({...chunk,context:highlighted});
      if(results.length>=30)break;
    }
  }
  return results;
}

function openSearch(){
  document.getElementById('searchOverlay').classList.add('visible');
  const input=document.getElementById('globalSearch');
  input.value='';
  input.focus();
  document.getElementById('searchResults').innerHTML='<div class="search-empty">Type to search across all modules...</div>';
  buildSearchIndex();
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('visible');
}
document.getElementById('globalSearch').addEventListener('input',function(){
  const results=performSearch(this.value);
  const container=document.getElementById('searchResults');
  if(!this.value.trim()){container.innerHTML='<div class="search-empty">Type to search across all modules...</div>';return}
  if(results.length===0){container.innerHTML='<div class="search-empty">No results found</div>';return}
  container.innerHTML=results.map((r,i)=>`
    <div class="search-result${i===0?' selected':''}" data-module="${r.module}" onclick="navigateTo('${r.module}');closeSearch()">
      <div class="sr-module">${r.num?r.num+' — ':''}${r.moduleTitle}</div>
      <div class="sr-context">${r.context}</div>
    </div>
  `).join('');
});
document.getElementById('globalSearch').addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeSearch();return}
  const items=document.querySelectorAll('.search-result');
  if(!items.length)return;
  const sel=document.querySelector('.search-result.selected');
  let idx=Array.from(items).indexOf(sel);
  if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);items.forEach(i=>i.classList.remove('selected'));items[idx].classList.add('selected')}
  if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);items.forEach(i=>i.classList.remove('selected'));items[idx].classList.add('selected')}
  if(e.key==='Enter'&&sel){sel.click()}
});

/* SIDEBAR SEARCH - filters nav items */
document.getElementById('sidebarSearch').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('.nav-item').forEach(el=>{
    if(!q){el.style.display='';return}
    el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';
  });
  document.querySelectorAll('.nav-section').forEach(sec=>{
    if(!q){sec.style.display='';sec.classList.remove('collapsed');return}
    const visibleItems=sec.querySelectorAll('.nav-item[style=""],.nav-item:not([style])');
    sec.style.display=visibleItems.length===0?'none':'';
    if(visibleItems.length>0)sec.classList.remove('collapsed');
  });
});

document.addEventListener('keydown',e=>{

/* PRACTICE QUESTIONS */
let practiceQuestions = {};
let currentPracticeModule = 'all';
let answeredQuestions = {};

function getAnswered(){try{return JSON.parse(localStorage.getItem('ceh_quiz')||'{}')}catch(e){return{}}}
function saveAnswered(a){localStorage.setItem('ceh_quiz',JSON.stringify(a))}
answeredQuestions = getAnswered();

function loadPracticeQuestions(){
  if(Object.keys(practiceQuestions).length > 0) return Promise.resolve();
  return fetch('questions.json')
    .then(r => r.json())
    .then(data => {
      practiceQuestions = {};
      data.forEach(q => {
        const mod = q.set.startsWith('Practice_') ? q.set.replace('Practice_','') : q.set.substring(0,2);
        if(!practiceQuestions[mod]) practiceQuestions[mod] = [];
        const correctIdx = q.o.indexOf(q.c);
        const answerLetter = String.fromCharCode(65 + correctIdx);
        practiceQuestions[mod].push({
          question: q.q,
          options: q.o,
          answer: answerLetter,
          explanation: q.e || ''
        });
      });
    })
    .catch(e => {
      console.error('Error loading practice questions:', e);
      practiceQuestions = {};
    });
}

function renderPracticePage(moduleFilter){
  currentPracticeModule = moduleFilter || 'all';
  const content = document.getElementById('contentArea');
  const questions = getFilteredQuestions();
  
  let html = `
    <div class="practice-header">
      <h1>CEH v13 Practice Questions</h1>
      <p>Test your knowledge with exam-style questions for each module</p>
      <div class="practice-stats">
        <div class="practice-stat">
          <div class="stat-num">${questions.length}</div>
          <div class="stat-label">Questions</div>
        </div>
        <div class="practice-stat">
          <div class="stat-num">${Object.keys(practiceQuestions).length}</div>
          <div class="stat-label">Modules</div>
        </div>
        <div class="practice-stat">
          <div class="stat-num" id="answeredCount">0</div>
          <div class="stat-label">Answered</div>
        </div>
      </div>
    </div>
    <div class="module-filter">
      <button class="module-filter-btn ${currentPracticeModule==='all'?'active':''}" onclick="renderPracticePage('all')">All Modules</button>
  `;
  
  Object.keys(practiceQuestions).sort().forEach(mod => {
    const isActive = currentPracticeModule === mod;
    html += `<button class="module-filter-btn ${isActive?'active':''}" onclick="renderPracticePage('${mod}')">Module ${mod}</button>`;
  });
  
  html += `</div><div id="questionsContainer">`;
  
  questions.forEach((q, idx) => {
    const qId = `${q.module}-${idx}`;
    const isAnswered = answeredQuestions[qId];
    html += renderQuestion(q, qId, idx + 1);
  });
  
  html += `</div>`;
  html += `
    <div class="practice-progress">
      <div class="bar"><div class="fill" id="practiceProgressFill" style="width:0%"></div></div>
      <div class="stats"><strong id="practiceCorrect">0</strong> / ${questions.length} correct</div>
      <button class="question-action-btn" onclick="resetAllAnswers()">Reset All</button>
    </div>
  `;
  
  content.innerHTML = html;
  content.className = 'content';
  updatePracticeProgress();
}

function getFilteredQuestions(){
  const questions = [];
  Object.keys(practiceQuestions).sort().forEach(mod => {
    if(currentPracticeModule !== 'all' && mod !== currentPracticeModule) return;
    practiceQuestions[mod].forEach(q => {
      questions.push({...q, module: mod});
    });
  });
  return questions;
}

function renderQuestion(q, qId, num){
  const letters = ['A', 'B', 'C', 'D'];
  const prev = answeredQuestions[qId];
  let html = `
    <div class="question-card${prev?' open':''}" id="q-${qId}">
      <div class="question-header" onclick="toggleQuestion('${qId}')">
        <span class="question-num">Q${num}</span>
        <span class="question-text">${q.question}</span>
        <span class="question-toggle">&#x25bc;</span>
      </div>
      <div class="question-options">
  `;
  
  q.options.forEach((opt, i) => {
    let cls = '';
    if(prev){
      if(letters[i] === prev.selected && !prev.correct) cls = ' incorrect';
      else if(letters[i] === prev.selected && prev.correct) cls = ' correct';
      else if(letters[i] === q.answer && !prev.correct) cls = ' correct';
    }
    html += `
      <div class="question-option${cls}" id="opt-${qId}-${i}" onclick="selectOption('${qId}', ${i}, '${q.answer}')">
        <span class="opt-letter">${letters[i]}</span>
        <span class="opt-text">${opt}</span>
      </div>
    `;
  });
  
  html += `
      </div>
      <div class="question-answer">
        <div class="answer-label">Correct Answer: ${q.answer}</div>
        <div class="answer-explanation">
          <p>${q.explanation}</p>
        </div>
        <div class="question-actions">
          <button class="question-action-btn" onclick="resetQuestion('${qId}')">Reset</button>
          <button class="question-action-btn show-answer" onclick="showCorrectAnswer('${qId}', '${q.answer}')">Show Answer</button>
        </div>
      </div>
    </div>
  `;
  
  return html;
}

function toggleQuestion(qId){
  const card = document.getElementById(`q-${qId}`);
  card.classList.toggle('open');
}

function selectOption(qId, selectedIdx, correctAnswer){
  const letters = ['A', 'B', 'C', 'D'];
  const selectedLetter = letters[selectedIdx];
  const isCorrect = selectedLetter === correctAnswer;
  
  answeredQuestions[qId] = {selected: selectedLetter, correct: isCorrect};
  saveAnswered(answeredQuestions);
  
  const card = document.getElementById(`q-${qId}`);
  card.querySelectorAll('.question-option').forEach((opt, i) => {
    opt.classList.remove('selected', 'correct', 'incorrect');
    if(i === selectedIdx){
      opt.classList.add(isCorrect ? 'correct' : 'incorrect');
    }
    if(letters[i] === correctAnswer && !isCorrect){
      opt.classList.add('correct');
    }
  });
  
  updatePracticeProgress();
}

function resetQuestion(qId){
  const card = document.getElementById(`q-${qId}`);
  card.querySelectorAll('.question-option').forEach(opt => {
    opt.classList.remove('selected', 'correct', 'incorrect');
  });
  delete answeredQuestions[qId];
  saveAnswered(answeredQuestions);
  updatePracticeProgress();
}

function showCorrectAnswer(qId, correctAnswer){
  const letters = ['A', 'B', 'C', 'D'];
  const correctIdx = letters.indexOf(correctAnswer);
  const card = document.getElementById(`q-${qId}`);
  
  card.querySelectorAll('.question-option').forEach((opt, i) => {
    opt.classList.remove('selected', 'incorrect');
    if(i === correctIdx){
      opt.classList.add('correct');
    }
  });
  
  if(!answeredQuestions[qId]){
    answeredQuestions[qId] = {selected: correctAnswer, correct: true};
    saveAnswered(answeredQuestions);
  }
  updatePracticeProgress();
}

function updatePracticeProgress(){
  const total = Object.keys(answeredQuestions).length;
  const correct = Object.values(answeredQuestions).filter(a => a.correct).length;
  const allQuestions = getFilteredQuestions().length;
  const pct = allQuestions > 0 ? (correct / allQuestions * 100) : 0;
  
  const fill = document.getElementById('practiceProgressFill');
  const correctEl = document.getElementById('practiceCorrect');
  const answeredEl = document.getElementById('answeredCount');
  
  if(fill) fill.style.width = pct + '%';
  if(correctEl) correctEl.textContent = correct;
  if(answeredEl) answeredEl.textContent = total;
}

function resetAllAnswers(){
  if(!confirm('Reset all quiz answers?')) return;
  answeredQuestions = {};
  saveAnswered(answeredQuestions);
  renderPracticePage(currentPracticeModule);
}

function navigateToPractice(moduleId){
  currentModule = 'practice';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-item[data-module="practice"]')?.classList.add('active');
  
  document.getElementById('breadcrumb').innerHTML = '<strong>Practice</strong> Exam Questions';
  document.getElementById('btnBackHome').style.display = '';
  document.getElementById('btnMarkDone').style.display = 'none';
  
  const content = document.getElementById('contentArea');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  content.className = 'content loading';
  
  loadPracticeQuestions().then(() => {
    renderPracticePage(moduleId || 'all');
    document.getElementById('contentWrap').scrollTop = 0;
  });
  
  closeSidebar();
}

/* QUIZ */
let quizData = null;
let quizState = null;

async function loadQuizData() {
  if (quizData) return quizData;
  try {
    const resp = await fetch('questions.json');
    if (!resp.ok) throw new Error('Failed to load questions.json');
    quizData = await resp.json();
    return quizData;
  } catch (e) {
    return null;
  }
}

function showQuizLanding() {
  const content = document.getElementById('contentArea');
  content.className = 'content';
  if (!quizData) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    loadQuizData().then(() => showQuizLanding());
    return;
  }
  const sets = [...new Set(quizData.map(q => q.set))];
  const setLabels = {
    'CEH_V13_Practice_Questions_1747494071': 'Practice Questions (PDF)',
    'CEH_Exam_Set_2_1747494364': 'Exam Set 2 (PDF)',
    'CEH_V13_Exam_Set_3_1747494374': 'Exam Set 3 (PDF)',
    'CEH_Exam_Set_4_1747494383': 'Exam Set 4 (PDF)'
  };
  const pdfSets = sets.filter(s => !s.startsWith('Practice_'));
  const practiceSets = sets.filter(s => s.startsWith('Practice_'));
  let setOpts = '<option value="all">All Sets (' + quizData.length + ')</option>';
  if(pdfSets.length) {
    setOpts += `<optgroup label="PDF Exam Sets">`;
    pdfSets.forEach(s => {
      const count = quizData.filter(q => q.set === s).length;
      setOpts += `<option value="${s}">${setLabels[s] || s} (${count})</option>`;
    });
    setOpts += `</optgroup>`;
  }
  if(practiceSets.length) {
    setOpts += `<optgroup label="Module Practice">`;
    practiceSets.forEach(s => {
      const count = quizData.filter(q => q.set === s).length;
      const modNum = s.replace('Practice_','');
      setOpts += `<option value="${s}">Module ${modNum} (${count})</option>`;
    });
    setOpts += `</optgroup>`;
  }

  content.innerHTML = `
    <div class="home-hero">
      <h1>Practice Questions</h1>
      <p>674 questions from CEH v13 exam sets and module practice. Test your knowledge before the real exam.</p>
    </div>
    <div class="quiz-controls">
      <select id="quizSetFilter">${setOpts}</select>
      <select id="quizCount">
        <option value="10">10 questions</option>
        <option value="25">25 questions</option>
        <option value="50">50 questions</option>
        <option value="0">All questions</option>
      </select>
      <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>
    <div id="quizArea"></div>
  `;
  document.getElementById('contentWrap').scrollTop = 0;
}

function startQuiz() {
  const setFilter = document.getElementById('quizSetFilter').value;
  const countFilter = parseInt(document.getElementById('quizCount').value);
  let pool = setFilter === 'all' ? [...quizData] : quizData.filter(q => q.set === setFilter);
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (countFilter > 0) pool = pool.slice(0, countFilter);

  quizState = {
    questions: pool,
    current: 0,
    answers: {},
    correct: 0,
    wrong: 0
  };
  renderQuizQuestion();
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  const st = quizState;
  if (!st || !st.questions.length) return;

  // Check if done
  if (st.current >= st.questions.length) {
    renderQuizSummary();
    return;
  }

  const q = st.questions[st.current];
  const answered = st.answers[q.id] !== undefined;
  const pct = Math.round((st.current / st.questions.length) * 100);
  const setLabels = {
    'CEH_V13_Practice_Questions_1747494071': 'Practice Questions (PDF)',
    'CEH_Exam_Set_2_1747494364': 'Exam Set 2 (PDF)',
    'CEH_V13_Exam_Set_3_1747494374': 'Exam Set 3 (PDF)',
    'CEH_Exam_Set_4_1747494383': 'Exam Set 4 (PDF)'
  };
  const qSetLabel = q.set.startsWith('Practice_') ? `Module ${q.set.replace('Practice_','')}` : (setLabels[q.set] || q.set);

  let optionsHtml = q.o.map((opt, idx) => {
    let cls = 'quiz-opt';
    if (answered) {
      cls += ' disabled';
      if (opt === q.c) cls += ' correct reveal-correct';
      if (st.answers[q.id] === opt && opt !== q.c) cls += ' wrong';
    }
    return `<button class="${cls}" data-qid="${q.id}" data-opt="${idx}" onclick="answerQuiz(this)">${escapeHtml(opt)}</button>`;
  }).join('');

  area.innerHTML = `
    <div class="quiz-progress">
      <span>${st.current + 1} / ${st.questions.length}</span>
      <div class="qbar"><div class="qfill" style="width:${pct}%"></div></div>
      <span>${st.correct} correct</span>
    </div>
    <div class="quiz-card">
      <div class="q-set">${qSetLabel}</div>
      <div class="q-num">Question ${q.num}</div>
      <div class="q-text">${escapeHtml(q.q)}</div>
      <div class="quiz-options">${optionsHtml}</div>
      <div class="quiz-explain${answered ? ' show' : ''}">${escapeHtml(q.e || '')}</div>
    </div>
    <div class="quiz-nav">
      <button onclick="prevQuizQuestion()" ${st.current === 0 ? 'disabled' : ''}>Previous</button>
      <button onclick="nextQuizQuestion()">${st.current === st.questions.length - 1 ? 'Finish' : 'Next'}</button>
    </div>
  `;
}

function answerQuiz(btn) {
  const qid = btn.dataset.qid;
  const optIdx = parseInt(btn.dataset.opt);
  const q = quizState.questions.find(x => x.id === qid);
  const answer = q.o[optIdx];
  if (quizState.answers[qid] !== undefined) return;
  quizState.answers[qid] = answer;
  if (answer === q.c) quizState.correct++;
  else quizState.wrong++;
  renderQuizQuestion();
}

function nextQuizQuestion() {
  if (quizState.current < quizState.questions.length - 1) {
    quizState.current++;
    renderQuizQuestion();
    document.getElementById('contentWrap').scrollTop = 0;
  } else {
    quizState.current = quizState.questions.length;
    renderQuizSummary();
  }
}

function prevQuizQuestion() {
  if (quizState.current > 0) {
    quizState.current--;
    renderQuizQuestion();
    document.getElementById('contentWrap').scrollTop = 0;
  }
}

function renderQuizSummary() {
  const area = document.getElementById('quizArea');
  const st = quizState;
  const total = st.questions.length;
  const pct = Math.round((st.correct / total) * 100);
  const cls = pct >= 80 ? 'great' : pct >= 50 ? 'ok' : 'bad';
  area.innerHTML = `
    <div class="quiz-summary">
      <h2>Quiz Complete!</h2>
      <div class="score ${cls}">${pct}%</div>
      <div class="stats">
        <strong>${st.correct}</strong> correct / <strong>${st.wrong}</strong> wrong / <strong>${total}</strong> total
      </div>
      <div class="quiz-controls" style="justify-content:center">
        <button class="start-btn" onclick="startQuiz()">Retry</button>
        <button onclick="showQuizLanding()">Change Settings</button>
      </div>
    </div>
  `;
}
